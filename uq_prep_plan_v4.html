<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matthew's 30-Day UQ Prep</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f6f5f3;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.07);
    --text: #1a1a1a;
    --sub: #888;
    --hover: #fafaf9;
    --code-bg: #f0ede8;
    --progress: #7F77DD;
    --java-dot: #7F77DD; --java-pill-bg: #EEEDFE; --java-pill-text: #3C3489;
    --hw-dot: #1D9E75;   --hw-pill-bg: #E1F5EE;   --hw-pill-text: #085041;
    --r-dot: #BA7517;    --r-pill-bg: #FAEEDA;    --r-pill-text: #633806;
    --rev-dot: #888780;  --rev-pill-bg: #F1EFE8;  --rev-pill-text: #444441;
    --check-done: #1D9E75;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111111; --surface: #1c1c1c; --border: rgba(255,255,255,0.07);
      --text: #e2e8f0; --sub: #666; --hover: #222; --code-bg: #2a2a2a;
      --java-pill-bg: #26215C; --java-pill-text: #CECBF6;
      --hw-pill-bg: #04342C;   --hw-pill-text: #9FE1CB;
      --r-pill-bg: #412402;    --r-pill-text: #FAC775;
      --rev-pill-bg: #2C2C2A;  --rev-pill-text: #B4B2A9;
    }
  }

  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; font-size: 14px; line-height: 1.5; padding: 24px 16px 60px; }

  .wrap { max-width: 700px; margin: 0 auto; }

  .header-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sub); margin-bottom: 4px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
  .header-sub { font-size: 13px; color: var(--sub); margin-bottom: 20px; }

  .progress-wrap { margin-bottom: 6px; display: flex; justify-content: space-between; align-items: baseline; }
  .progress-label { font-size: 12px; color: var(--sub); }
  .progress-pct { font-size: 13px; font-weight: 600; }
  .progress-track { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 20px; }
  .progress-bar { height: 100%; background: var(--progress); border-radius: 99px; width: 0%; transition: width 0.4s ease; }

  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 22px; }
  .leg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--sub); }
  .leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .week-section { margin-bottom: 28px; }
  .week-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--sub); margin-bottom: 10px; }

  .day-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; transition: border-color 0.2s; }
  .day-card.done { border-color: rgba(29,158,117,0.25); }

  .day-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; user-select: none; transition: background 0.15s; }
  .day-header:hover { background: var(--hover); }

  .check-btn { width: 20px; height: 20px; border-radius: 5px; border: 1.5px solid var(--sub); background: transparent; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; transition: all 0.15s; }
  .check-btn.checked { background: var(--check-done); border-color: var(--check-done); }

  .day-num { font-size: 11px; color: var(--sub); min-width: 40px; flex-shrink: 0; }
  .day-title { font-size: 13px; font-weight: 500; flex: 1; }
  .day-title.done-text { text-decoration: line-through; color: var(--sub); }

  .pills { display: flex; gap: 5px; flex-shrink: 0; }
  .pill { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px; }
  .pill-java { background: var(--java-pill-bg); color: var(--java-pill-text); }
  .pill-hw   { background: var(--hw-pill-bg);   color: var(--hw-pill-text); }
  .pill-r    { background: var(--r-pill-bg);    color: var(--r-pill-text); }
  .pill-rev  { background: var(--rev-pill-bg);  color: var(--rev-pill-text); }

  .chevron { font-size: 13px; color: var(--sub); flex-shrink: 0; transition: transform 0.2s; display: inline-block; }
  .chevron.open { transform: rotate(180deg); }

  .day-body { display: none; border-top: 0.5px solid var(--border); padding: 12px 14px; }
  .day-body.open { display: block; }

  .task-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
  .task-row:last-of-type { margin-bottom: 0; }
  .task-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .task-main { font-size: 13px; font-weight: 500; }
  .task-sub { font-size: 12px; color: var(--sub); margin-top: 2px; line-height: 1.55; }
  .task-video { display: inline-flex; align-items: center; gap: 4px; margin-top: 4px; margin-bottom: 4px; font-size: 12px; font-weight: 600; color: var(--java-pill-text); background: var(--java-pill-bg); padding: 3px 9px; border-radius: 6px; text-decoration: none; transition: opacity 0.15s; }
  .task-video:hover { opacity: 0.75; }
  .task-row:has(.task-dot[style*="hw-dot"]) .task-video { color: var(--hw-pill-text); background: var(--hw-pill-bg); }
  .task-row:has(.task-dot[style*="r-dot"]) .task-video { color: var(--r-pill-text); background: var(--r-pill-bg); }
  .task-course { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--sub); margin-bottom: 3px; opacity: 0.75; }
  .task-time { font-size: 11px; color: var(--sub); margin-top: 3px; font-style: italic; }

  .task-check { width: 17px; height: 17px; border-radius: 4px; border: 1.5px solid var(--sub); background: transparent; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; transition: all 0.15s; margin-top: 3px; }
  .task-check.checked { background: var(--check-done); border-color: var(--check-done); }
  .task-row.task-done .task-main { text-decoration: line-through; color: var(--sub); }
  .task-row.task-done .task-sub { opacity: 0.5; }
  .task-row.task-done .task-time { opacity: 0.5; }

  .commit-row { margin-top: 12px; padding-top: 10px; border-top: 0.5px solid var(--border); }
  .commit-row code { font-family: "SF Mono", "Fira Code", monospace; font-size: 11px; background: var(--code-bg); padding: 3px 7px; border-radius: 4px; color: var(--sub); }

  .review-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
  .review-day-num { font-size: 11px; color: var(--sub); margin-bottom: 2px; }
  .review-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .review-tasks { font-size: 12px; color: var(--sub); line-height: 2; }

  .footer { text-align: center; font-size: 12px; color: var(--sub); margin-top: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header-eyebrow">UQ · Semester 2 · 2026</div>
  <h1>30-Day Study Plan</h1>
  <p class="header-sub">CSSE2002 · CSSE2010 · STAT1201 &mdash; 20 min per subject per day · starts 27 July 2026</p>

  <div class="progress-wrap">
    <span class="progress-label" id="prog-label">0 of 26 active days complete</span>
    <span class="progress-pct" id="prog-pct">0%</span>
  </div>
  <div class="progress-track"><div class="progress-bar" id="pbar"></div></div>

  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:var(--java-dot)"></div>Java OOP · <strong>CSSE2002</strong></div>
    <div class="leg"><div class="leg-dot" style="background:var(--hw-dot)"></div>Digital Logic · <strong>CSSE2010</strong></div>
    <div class="leg"><div class="leg-dot" style="background:var(--r-dot)"></div>R Analytics · <strong>STAT1201</strong></div>
    <div class="leg"><div class="leg-dot" style="background:var(--rev-dot)"></div>Review day</div>
  </div>

  <div id="container"></div>
  <p class="footer">Semester 2 starts ~28 July 2026 &nbsp;·&nbsp; Good luck Matthew 🎓</p>
</div>

const WEEK_LABELS = {
  1: "Week 1 — Foundations",
  2: "Week 2 — Building Blocks",
  3: "Week 3 — OOP & Circuits",
  4: "Week 4 — Advanced & Applied",
  5: "Week 5 — Consolidation",
};

const STORAGE_KEY = "uq30_v2";

// ── State ────────────────────────────────────────────────────────────────────
let checked = {};
try { checked = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch {}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(checked)); } catch {}
}

// ── Progress ─────────────────────────────────────────────────────────────────
const activeDays = DAYS.filter(d => !d.isReview);
const total = activeDays.length;

function updateProgress() {
  const done = activeDays.filter(d =>
    d.tasks.every((_, i) => !!checked[`day${d.day}_task${i}`])
  ).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById("pbar").style.width = pct + "%";
  document.getElementById("prog-label").textContent = done + " of " + total + " active days complete";
  document.getElementById("prog-pct").textContent = pct + "%";
}

// ── Render ───────────────────────────────────────────────────────────────────
const container = document.getElementById("container");

const weeks = {};
DAYS.forEach(d => { if (!weeks[d.week]) weeks[d.week] = []; weeks[d.week].push(d); });

Object.entries(weeks).forEach(([wk, entries]) => {
  const section = document.createElement("div");
  section.className = "week-section";

  const label = document.createElement("div");
  label.className = "week-label";
  label.textContent = WEEK_LABELS[wk] || "Week " + wk;
  section.appendChild(label);

  entries.forEach(entry => {
    if (entry.isReview) {
      const card = document.createElement("div");
      card.className = "review-card";
      card.innerHTML =
        `<div class="review-day-num">Day ${entry.day}</div>` +
        `<div class="review-title">🔁 Review day</div>` +
        `<div class="review-tasks">${entry.reviewTasks.map(t => "· " + t).join("<br>")}</div>` +
        `<div class="commit-row"><code>git commit -m "${entry.commit}"</code></div>`;
      section.appendChild(card);
      return;
    }

    const numTasks = entry.tasks.length;
    const taskKey = (i) => `day${entry.day}_task${i}`;
    const isDayDone = () => entry.tasks.every((_, i) => !!checked[taskKey(i)]);

    const card = document.createElement("div");
    card.className = "day-card" + (isDayDone() ? " done" : "");

    const pillLabels = { java:"Java", hw:"Logic", r:"R", rev:"Review" };

    const pillsHtml = entry.pills.map(p =>
      `<span class="pill pill-${p}">${pillLabels[p]}</span>`
    ).join("");

    const header = document.createElement("div");
    header.className = "day-header";
    header.innerHTML =
      `<button class="check-btn${isDayDone() ? " checked" : ""}" data-day="${entry.day}" title="All tasks complete">` +
        (isDayDone() ? "✓" : "") +
      `</button>` +
      `<span class="day-num">Day ${entry.day}</span>` +
      `<span class="day-title${isDayDone() ? " done-text" : ""}">${entry.title}</span>` +
      `<div class="pills">${pillsHtml}</div>` +
      `<span class="chevron">⌄</span>`;

    const dotColors = { java:"var(--java-dot)", hw:"var(--hw-dot)", r:"var(--r-dot)", rev:"var(--rev-dot)" };

    const body = document.createElement("div");
    body.className = "day-body";

    // Build task rows with individual checkmarks
    const taskRowEls = entry.tasks.map((t, i) => {
      const isTaskDone = () => !!checked[taskKey(i)];
      const row = document.createElement("div");
      row.className = "task-row" + (isTaskDone() ? " task-done" : "");
      row.innerHTML =
        `<button class="task-check${isTaskDone() ? " checked" : ""}" title="Mark task done">${isTaskDone() ? "✓" : ""}</button>` +
        `<div class="task-dot" style="background:${dotColors[t.color]}"></div>` +
        `<div>` +
          (t.course ? `<div class="task-course">${t.course}</div>` : "") +
          `<div class="task-main">${t.main}</div>` +
          (t.video ? `<a class="task-video" href="${t.video.url}" target="_blank" rel="noopener">${t.video.label}</a>` : "") +
          (t.video2 ? `<a class="task-video" href="${t.video2.url}" target="_blank" rel="noopener">${t.video2.label}</a>` : "") +
          `<div class="task-sub">${t.sub}</div>` +
          `<div class="task-time">⏱ ${t.time}</div>` +
        `</div>`;

      row.querySelector(".task-check").addEventListener("click", (e) => {
        e.stopPropagation();
        checked[taskKey(i)] = !checked[taskKey(i)];
        save();
        const done = isTaskDone();
        e.currentTarget.className = "task-check" + (done ? " checked" : "");
        e.currentTarget.textContent = done ? "✓" : "";
        row.className = "task-row" + (done ? " task-done" : "");

        // Update day header if all tasks done
        const allDone = isDayDone();
        header.querySelector(".check-btn").className = "check-btn" + (allDone ? " checked" : "");
        header.querySelector(".check-btn").textContent = allDone ? "✓" : "";
        header.querySelector(".day-title").className = "day-title" + (allDone ? " done-text" : "");
        card.className = "day-card" + (allDone ? " done" : "");
        updateProgress();
      });

      return row;
    });

    taskRowEls.forEach(r => body.appendChild(r));
    const commitDiv = document.createElement("div");
    commitDiv.className = "commit-row";
    commitDiv.innerHTML = `<code>git commit -m "${entry.commit}"</code>`;
    body.appendChild(commitDiv);

    // Toggle expand
    header.addEventListener("click", (e) => {
      if (e.target.closest(".check-btn")) return;
      const isOpen = body.classList.toggle("open");
      header.querySelector(".chevron").classList.toggle("open", isOpen);
    });

    // Day-level check button (manual override — tick all or untick all)
    header.querySelector(".check-btn").addEventListener("click", (e) => {
      e.stopPropagation();
      const allDone = isDayDone();
      entry.tasks.forEach((_, i) => { checked[taskKey(i)] = !allDone; });
      save();
      const nowDone = isDayDone();
      e.currentTarget.className = "check-btn" + (nowDone ? " checked" : "");
      e.currentTarget.textContent = nowDone ? "✓" : "";
      header.querySelector(".day-title").className = "day-title" + (nowDone ? " done-text" : "");
      card.className = "day-card" + (nowDone ? " done" : "");
      taskRowEls.forEach((row, i) => {
        const done = !!checked[taskKey(i)];
        row.className = "task-row" + (done ? " task-done" : "");
        row.querySelector(".task-check").className = "task-check" + (done ? " checked" : "");
        row.querySelector(".task-check").textContent = done ? "✓" : "";
      });
      updateProgress();
    });

    card.appendChild(header);
    card.appendChild(body);
    section.appendChild(card);
  });

  container.appendChild(section);
});

updateProgress();
</script>
</body>
</html>
